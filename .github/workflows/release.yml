name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  version-contract:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Select Xcode 26
        run: |
          set -euo pipefail
          app="$(find /Applications -maxdepth 1 -name 'Xcode_26*.app' -print | sort -V | tail -1)"
          test -n "$app"
          sudo xcode-select -s "$app/Contents/Developer"
      - name: Verify generated version source
        run: scripts/generate-version.sh --check
      - name: Build the release architecture set
        run: swift build -c release --product cc-sudo --arch arm64 --arch x86_64
      - name: Verify release tag and built executable version
        run: |
          bin="$(swift build -c release --product cc-sudo --arch arm64 --arch x86_64 --show-bin-path)"
          scripts/verify-release-version.sh "$bin/cc-sudo" "$GITHUB_REF_NAME"
  release:
    needs: version-contract
    uses: yasyf/homebrew-tap/.github/workflows/release-swift.yml@1125c8b0424d70bfed2059432ee9df639ff61518
    secrets: inherit
